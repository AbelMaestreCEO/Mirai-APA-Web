name = "mirai-apa-web"
compatibility_date = "2024-01-01"

# Pages usa las Functions de la carpeta /functions automáticamente.
# El frontend se sirve desde la raíz del repo.
# No necesita "main" aquí — eso es solo para Workers standalone.

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "mirai-apa"

[[d1_databases]]
binding = "DB"
database_name = "mirai-apa-db"
database_id = "3e137a15-c354-4ac3-ad37-85660d7e79ca"

[vars]
ENVIRONMENT = "production"
